name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: lint + typecheck + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    env:
      PY_VERSION: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install "$PY_VERSION"
        shell: bash

      - name: Install project
        run: uv sync --all-extras --python "$PY_VERSION"
        shell: bash

      - name: Lint
        run: |
          uv run ruff format --check .
          uv run ruff check .
        shell: bash

      - name: Typecheck
        run: uv run mypy src tests
        shell: bash

      - name: Test
        run: uv run pytest --cov --cov-report=xml
        shell: bash

      - name: Upload coverage
        if: env.PY_VERSION == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false

  security:
    name: security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # gitleaks-action scans commits between merge-base and HEAD on PRs.
          # A shallow clone (default depth=1) doesn't contain the base, so it
          # errors with "unknown revision or path not in the working tree".
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project
        run: uv sync --all-extras

      - name: Bandit
        run: uv run bandit -r src/ -c pyproject.toml

      - name: pip-audit
        # `uv export` includes the project itself (mcp-server-roboflow) in the
        # requirements file. pip-audit fails with "not found on PyPI" on any
        # version not yet published, so strip our own package before auditing.
        run: |
          uv export --format requirements-txt --no-hashes --all-extras \
            | grep -v '^mcp-server-roboflow==' \
            | grep -v '^-e \.' \
            > requirements.txt
          uv run pip-audit --strict --requirement requirements.txt

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
